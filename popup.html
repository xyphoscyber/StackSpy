<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StackSpy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0D0F14;
    --bg2:     #13161E;
    --bg3:     #1A1E28;
    --border:  #252A38;
    --text:    #E8EAF0;
    --muted:   #6B7395;
    --accent:  #4FFFC4;
    --accent2: #7B5EFF;
    --warn:    #FFB547;
    --danger:  #FF5F6D;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 400px;
    min-height: 200px;
    max-height: 600px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    padding: 14px 16px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .logo-text {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .logo-sub {
    font-size: 9px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: block;
    margin-top: -2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .scan-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .scan-btn:hover { background: var(--accent); color: var(--bg); }
  .scan-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── URL Bar ── */
  .url-bar {
    padding: 7px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }
  .url-bar span { color: var(--accent); margin-right: 6px; }

  /* ── Summary Bar ── */
  .summary {
    padding: 10px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-num.warn { color: var(--warn); }
  .stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .summary-divider {
    width: 1px;
    background: var(--border);
    margin: 0 4px;
  }
  .risk-bar {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 8px;
  }
  .risk-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }
  .risk-track {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .risk-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(.22,1,.36,1);
  }
  .risk-low  { background: var(--accent); }
  .risk-med  { background: var(--warn); }
  .risk-high { background: var(--danger); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-badge {
    display: inline-block;
    margin-left: 4px;
    background: var(--border);
    color: var(--muted);
    font-size: 9px;
    border-radius: 10px;
    padding: 0 5px;
    line-height: 15px;
  }
  .tab.active .tab-badge { background: var(--accent); color: var(--bg); }

  /* ── Content ── */
  .content {
    overflow-y: auto;
    flex: 1;
    padding: 10px 12px;
  }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Category ── */
  .category {
    margin-bottom: 12px;
  }
  .cat-header {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 6px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── DB Card ── */
  .db-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .db-card:hover { border-color: var(--accent2); }
  .db-icon-wrap {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .db-info { flex: 1; min-width: 0; }
  .db-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .conf-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 20px;
    font-weight: 600;
  }
  .conf-high { background: rgba(79,255,196,0.15); color: var(--accent); }
  .conf-med  { background: rgba(255,181,71,0.15); color: var(--warn); }
  .conf-low  { background: rgba(255,95,109,0.15); color: var(--danger); }
  .db-signals {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .signal-tag {
    display: inline-block;
    margin-right: 4px;
    padding: 1px 5px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 8px;
    color: var(--muted);
  }

  /* ── Empty / Loading / States ── */
  .state-box {
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
  }
  .state-icon { font-size: 32px; margin-bottom: 10px; }
  .state-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .state-desc { font-size: 11px; line-height: 1.6; }
  .pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Raw Signals Tab ── */
  .signals-list {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .signals-list div {
    padding: 4px 8px;
    border-left: 2px solid var(--border);
    margin-bottom: 4px;
    line-height: 1.5;
  }
  .signals-list div:hover { border-color: var(--accent2); color: var(--text); }

  /* ── Hints Tab ── */
  .hint-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 11px;
  }
  .hint-title { font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
  .hint-text { color: var(--muted); line-height: 1.6; }
  .hint-icon { margin-right: 5px; }
  .framework-hint {
    background: rgba(123,94,255,0.08);
    border-color: rgba(123,94,255,0.3);
  }

  /* ── Export btn ── */
  .footer {
    padding: 8px 12px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .footer-note {
    font-size: 9px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .export-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .export-btn:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🗄️</div>
    <div>
      <div class="logo-text">StackSpy</div>
      <span class="logo-sub">Database &amp; Tech Fingerprinter</span>
    </div>
  </div>
  <div class="header-right">
    <button class="scan-btn" id="rescanBtn">↺ Rescan</button>
  </div>
</div>

<div class="url-bar" id="urlBar"><span>⬤</span>Scanning...</div>

<div class="summary" id="summary" style="display:none">
  <div class="stat">
    <div class="stat-num" id="totalCount">0</div>
    <div class="stat-label">Detected</div>
  </div>
  <div class="summary-divider"></div>
  <div class="stat">
    <div class="stat-num warn" id="highConfCount">0</div>
    <div class="stat-label">High conf.</div>
  </div>
  <div class="summary-divider"></div>
  <div class="risk-bar">
    <div class="risk-label">Exposure Score</div>
    <div class="risk-track"><div class="risk-fill" id="riskFill" style="width:0%"></div></div>
  </div>
</div>

<div class="tabs" id="tabsBar" style="display:none">
  <div class="tab active" data-tab="stack">Stack <span class="tab-badge" id="stackBadge">0</span></div>
  <div class="tab" data-tab="signals">Signals <span class="tab-badge" id="signalBadge">0</span></div>
  <div class="tab" data-tab="hints">Hints <span class="tab-badge" id="hintBadge">0</span></div>
</div>

<div class="content" id="content">
  <div class="state-box">
    <div class="state-icon pulse">🔍</div>
    <div class="state-title">Scanning page...</div>
    <div class="state-desc">Fingerprinting database stack</div>
  </div>
</div>

<div class="footer" id="footer" style="display:none">
  <span class="footer-note" id="footerNote">— / —</span>
  <button class="export-btn" id="exportBtn">⬇ Export JSON</button>
</div>

<script src="popup.js"></script>
</body>
</html>
